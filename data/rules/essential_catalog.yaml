rules:
- id: rule.essentials.underwear_all_trips.v1
  family: essential
  priority: 165
  confidence: 1.0
  enabled: true
  metadata:
    generalization_class: essential
    evidence_type: common_sense
    context_keys:
    - duration_days
  description: Underwear is essential for all trips
  when:
  - field: context.duration_days
    operator: '>='
    value: 1
  then:
    emit_items:
    - item_id: CLO-UNDERWEAR
      criticality: mandatory
      placement: any
      flags:
      - essential
      - clothing
      reason: Underwear essential - pack at least n+1 pairs for n days
